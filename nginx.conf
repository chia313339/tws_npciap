# nginx.conf
server {
    listen 80;

    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 隱藏 nginx 版號：Server 標頭與「預設錯誤頁（如 404 footer）」都不再顯示版本號。
    # 必要原因：VULN-012 讓敏感路徑回「真實 404」後，會露出底層 nginx 預設錯誤頁的版號，需一併關閉。
    server_tokens off;

    # VULN-016：關閉 ETag，避免洩漏靜態檔 inode/mtime 指紋（縱深防禦；反代層 openresty 亦應同步關閉）
    etag off;

    # VULN-012：已知敏感副檔名／路徑回真實 404，避免 SPA fallback 把不存在路徑都回 200
    location ~* \.(git|env|json|lock|sql|bak|config|yml|yaml|ini|sh|DS_Store)$ {
        return 404;
    }

    location ~* ^/(\.git|\.env|admin|config|api/internal) {
        return 404;
    }

    location / {
        # 嘗試直接提供文件，找不到才回 index.html（維持 SPA deep-link）
        try_files $uri $uri/ /index.html;
    }

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
