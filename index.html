<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/assets/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新北產業AI化輔導計劃 | New Taipei City Industrial AI Mentoring Program</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.WebchatConfig = {
        platformId: "975514e0",
        platformName: "新北經發AI小幫手",
        assetBaseUrl: "https://cos.twcc.ai/eddtwai/webchatcomponent",
        sendButtonUrl: "https://cos.twcc.ai/eddtwai/webchatcomponent/send-icon4.png",
        chatIconUrl:
          "https://cos.twcc.ai/eddtwai2/webchatcomponent/chatboticon/3dbf5da4-3c46-4e46-a8a5-fa4edd092726/975514e0/%E6%96%B0%E5%8C%97%E7%B6%93%E7%99%BC%E5%B1%80_%E9%BE%8D%E5%A5%BD(%E8%97%8D).png",
        botIconUrl:
          "https://cos.twcc.ai/eddtwai2/webchatcomponent/chatboticon/3dbf5da4-3c46-4e46-a8a5-fa4edd092726/975514e0/%E6%96%B0%E5%8C%97%E7%B6%93%E7%99%BC%E5%B1%80_%E9%BE%8D%E5%A5%BD(%E8%97%8D).png",
        defaultCorner: "右下角",
        baseUrl: "https://edb.crossbot.com.tw/api",
      };
    </script>
    <script src="https://cos.twcc.ai/eddtwai/webchatcomponent/webchat-component.js"></script>
    <style>
      #chat-icon {
        width: 102px !important;
        height: 102px !important;
        background-color: transparent !important;
        background-size: contain !important;
        background-repeat: no-repeat !important;
        background-position: center !important;
        border: none !important;
        box-shadow: none !important;
      }

      #chat-icon.corner-bottom-right {
        top: auto !important;
        left: auto !important;
        right: 20px !important;
        bottom: 20px !important;
      }

      #chat-icon.corner-bottom-left {
        top: auto !important;
        left: 20px !important;
        right: auto !important;
        bottom: 20px !important;
      }

      @media (max-width: 768px), (pointer: coarse) and (orientation: landscape) and (max-width: 1024px) {
        #chat-icon.corner-bottom-right {
          right: 16px !important;
          bottom: calc(16px + env(safe-area-inset-bottom, 0px)) !important;
        }

        #chat-icon.corner-bottom-left {
          left: 16px !important;
          bottom: calc(16px + env(safe-area-inset-bottom, 0px)) !important;
        }

        #chat-icon {
          width: 84px !important;
          height: 84px !important;
        }

        #chat-popup,
        #chat-popup.scaled {
          left: auto !important;
          top: auto !important;
          right: 16px !important;
          bottom: calc(16px + env(safe-area-inset-bottom, 0px)) !important;
          width: calc(100vw - 32px) !important;
          height: calc(100vh - 120px) !important;
        }
      }
    </style>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
